name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish, for example 1.2.0 or 1.2.1'
        required: true
        type: string
      npm_tag:
        description: 'npm distribution tag'
        required: true
        default: latest
        type: choice
        options:
          - latest
          - next
          - beta

permissions:
  contents: write

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Set package version
        run: |
          npm version "${{ inputs.version }}" --message "chore(release): v%s"

      - name: Build package
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public --tag "${{ inputs.npm_tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push release commit and tag
        run: git push origin HEAD:${{ github.ref_name }} --follow-tags
